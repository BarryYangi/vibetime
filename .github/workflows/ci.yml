name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  CSC_IDENTITY_AUTO_DISCOVERY: false

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run CI checks
        run: pnpm run ci

  package-mac:
    name: Package macOS arm64
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Verify Xcode icon toolchain
        run: |
          xcodebuild -version
          xcrun --find actool
          xcrun actool --version

      - name: Install packaging tools
        run: brew install imagemagick

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS package
        run: pnpm --filter @vibetime/desktop dist:mac

      - name: Verify macOS icon assets
        run: |
          test -f packages/desktop/release/mac-arm64/VibeTime.app/Contents/Resources/Assets.car
          plutil -p packages/desktop/release/mac-arm64/VibeTime.app/Contents/Info.plist | grep 'CFBundleIconName'

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vibetime-macos-arm64
          path: |
            packages/desktop/release/*.dmg
          if-no-files-found: error

  package-windows:
    name: Package Windows x64
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install packaging tools
        run: choco install imagemagick.app --yes --no-progress

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows package
        run: pnpm --filter @vibetime/desktop dist:win

      - name: Verify Windows package assets
        shell: bash
        run: |
          test -f packages/desktop/build/icon.ico
          test -f packages/desktop/release/win-unpacked/resources/bin/vibetime.exe
          test ! -f packages/desktop/release/win-unpacked/resources/bin/vibetime-hook.exe

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vibetime-windows-x64
          path: |
            packages/desktop/release/*.exe
          if-no-files-found: error

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - quality
      - package-mac
      - package-windows
    permissions:
      contents: write
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: vibetime-macos-arm64
          path: release-assets

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: vibetime-windows-x64
          path: release-assets

      - name: List release assets
        run: find release-assets -maxdepth 1 -type f -print | sort

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: VibeTime ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          overwrite_files: true
          files: release-assets/*
