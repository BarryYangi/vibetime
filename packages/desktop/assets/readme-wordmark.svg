<svg width="420" height="120" viewBox="0 0 420 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="VibeTime">
  <style>
    .wordmark {
      fill: #24292f;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 60px;
      font-weight: 700;
      letter-spacing: 0;
    }

    @media (prefers-color-scheme: dark) {
      .wordmark {
        fill: #d0d7de;
      }
    }
  </style>
  <g transform="translate(30 20) scale(0.4)">
    <rect width="200" height="200" rx="44" fill="#1A1F21"/>
    <polyline points="65,60 135,60 100,100 135,140 65,140 100,100 65,60" fill="none" stroke="#A4D45E" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="50,85 35,100 50,115" fill="none" stroke="#E6FFB3" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="150,85 165,100 150,115" fill="none" stroke="#E6FFB3" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="80" y1="160" x2="120" y2="160" stroke="#A4D45E" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  </g>
  <text class="wordmark" x="130" y="63" dominant-baseline="middle">VibeTime</text>
</svg>
