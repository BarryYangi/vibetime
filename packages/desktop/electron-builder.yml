appId: com.barryyangi.vibetime
productName: VibeTime
copyright: Copyright © 2026 Barry

directories:
  output: release

files:
  - out/**/*
  - build/icon.ico
  - package.json
  - "!node_modules/@vibetime/hook/vibetime"
  - "!node_modules/@vibetime/hook/vibetime-hook"
  - "!node_modules/@vibetime/hook/build/**/*"
  - "!node_modules/@vibetime/hook/scripts/**/*"
  - "!node_modules/@vibetime/hook/src/**/*"
  - "!node_modules/@vibetime/hook/dist/**/*.map"
  - "!node_modules/@vibetime/hook/dist/**/*.test.*"
  - "!node_modules/@vibetime/hook/*.tsbuildinfo"
  - "!node_modules/@vibetime/hook/tsconfig.json"
  - "!node_modules/@vibetime/hook/vitest.config.ts"
  - "!node_modules/@vibetime/core/dist/**/*.map"
  - "!node_modules/@vibetime/core/dist/**/*.test.*"

asar: true
asarUnpack:
  - node_modules/better-sqlite3/**/*

electronLanguages:
  - en-US
  - zh-CN

mac:
  category: public.app-category.developer-tools
  icon: build/AppIcon.icon
  identity: "-"
  extraResources:
    - from: ../hook/vibetime
      to: bin/vibetime
  target:
    - target: dir
      arch:
        - arm64
    - target: dmg
      arch:
        - arm64
  artifactName: ${productName}-${version}-${arch}.${ext}

win:
  icon: build/icon.ico
  extraResources:
    - from: ../hook/build/win-x64/vibetime.exe
      to: bin/vibetime.exe
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  artifactName: ${productName}-${version}-${arch}.${ext}

dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-Setup-${version}-${arch}.${ext}
